    <main class="main-grid single-column">

                    <img src="images/expoologo.png" alt="Expoo">

            </div>
        </div>

        <div class="player-right-side">
            <div class="player-stats-grid">

                    <span class="stat-value">1.04</span>
                    <span class="stat-label">Rating 3.0</span>
                </div>
                <div class="stat-item">
                    <span class="stat-value">0.71</span>
                    <span class="stat-label">KPR</span>
                </div>
                <div class="stat-item highlight">
                    <span class="stat-value">56%</span>
                    <span class="stat-label">HS %</span>
                </div>
            </div>

            <div class="player-skills">
                <div class="skill-bar">
                    <span>AIM</span>
                    <div class="bar-bg"><div class="bar-fill" style="width: 42%;"></div></div>
                </div>
                <div class="skill-bar">
                    <span>SENSE</span>
                    <div class="bar-bg"><div class="bar-fill" style="width: 12%;"></div></div>
                </div>
                <div class="skill-bar">
                    <span>UTILITY</span>
                    <div class="bar-bg"><div class="bar-fill" style="width: 100%;"></div></div>
                </div>
            </div>
        </div>
    </section>


    <section class="player-achievements">
    <h3>Achievements</h3>
